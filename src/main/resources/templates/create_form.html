<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Додати літак</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; max-width: 500px; }
        div { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<h2>Додати новий літак</h2>

<form th:action="@{/save}" method="post">
    <div>
        <label>Модель літака (напр., 737-800):</label>
        <input type="text" name="model" required>
    </div>
    <div>
        <label>Місткість (кількість місць):</label>
        <input type="number" name="capacity" min="1" required>
    </div>
    <div>
        <label>Виробник:</label>
        <select name="manufacturerId" required>
            <!-- show list of manufacturers -->
            <option th:each="m : ${manufacturers}" th:value="${m.id}" th:text="${m.name}"></option>
        </select>
    </div>
    <div>
        <label>Авіакомпанія:</label>
        <select name="airlineId" required>
            <!-- show list of airlines -->
            <option th:each="a : ${airlines}" th:value="${a.id}" th:text="${a.name}"></option>
        </select>
    </div>

    <button type="submit">Зберегти</button>
    <a th:href="@{/}" style="margin-left: 10px;">Скасувати</a>
</form>

</body>
</html>
