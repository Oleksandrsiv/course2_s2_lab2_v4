<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Авіапарк</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
        .btn { padding: 8px 12px; text-decoration: none; border-radius: 4px; color: white; }
        .btn-add { background-color: #4CAF50; }
        .btn-edit { background-color: #2196F3; }
        .btn-delete { background-color: #f44336; }
    </style>
</head>
<body>

<h2>Список літаків</h2>
<a th:href="@{/new}" class="btn btn-add">+ Додати новий літак</a>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Модель</th>
        <th>Місткість (пас.)</th>
        <th>Виробник (Країна)</th>
        <th>Авіакомпанія</th>
        <th>Дії</th>
    </tr>
    </thead>
    <tbody>
    <!-- Цикл: для кожного 'airplane' зі списку 'airplanes' створити рядок таблиці -->
    <tr th:each="airplane : ${airplanes}">
        <td th:text="${airplane.id}"></td>
        <td th:text="${airplane.model}"></td>
        <td th:text="${airplane.capacity}"></td>
        <td th:text="${airplane.manufacturer.name + ' (' + airplane.manufacturer.country + ')'}"></td>
        <td th:text="${airplane.airline.name + ' [' + airplane.airline.iataCode + ']'}"></td>
        <td>
            <a th:href="@{/edit/{id}(id=${airplane.id})}" class="btn btn-edit">Редагувати</a>
            <a th:href="@{/delete/{id}(id=${airplane.id})}" class="btn btn-delete" onclick="return confirm('Ви впевнені?');">Видалити</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
